<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Employee Dashboard - FlowForge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/header :: navbar('EMPLOYEE')}"></nav>
<div class="container">
    <h3 class="mb-1">Welcome, <span th:text="${user.name}"></span></h3>
    <p class="text-muted mb-4">Department: <span th:text="${user.department != null ? user.department.name : 'Not Assigned'}"></span>
        &nbsp;|&nbsp; Manager: <span th:text="${user.manager != null ? user.manager.name : 'Not Assigned'}"></span></p>

    <div class="d-flex gap-2 mb-4">
        <a th:href="@{/employee/leave/new}" class="btn btn-primary">Submit Leave Request</a>
        <a th:href="@{/employee/purchase/new}" class="btn btn-outline-primary">Submit Purchase Request</a>
    </div>

    <h5>My Leave Requests</h5>
    <table class="table table-bordered bg-white">
        <thead>
        <tr><th>ID</th><th>Type</th><th>Dates</th><th>Status</th><th>Submitted</th><th></th></tr>
        </thead>
        <tbody>
        <tr th:each="r : ${leaveRequests}">
            <td th:text="${r.id}"></td>
            <td th:text="${r.leaveType}"></td>
            <td th:text="${r.startDate} + ' to ' + ${r.endDate}"></td>
            <td><span class="badge badge-status" th:classappend="'status-' + ${r.status}" th:text="${r.status}"></span></td>
            <td th:text="${#temporals.format(r.submittedAt, 'dd-MM-yyyy HH:mm')}"></td>
            <td><a th:href="@{'/employee/leave/' + ${r.id}}" class="btn btn-sm btn-outline-secondary">View</a></td>
        </tr>
        <tr th:if="${#lists.isEmpty(leaveRequests)}"><td colspan="6" class="text-center text-muted">No leave requests yet</td></tr>
        </tbody>
    </table>

    <h5 class="mt-4">My Purchase Requests</h5>
    <table class="table table-bordered bg-white">
        <thead>
        <tr><th>ID</th><th>Item</th><th>Qty</th><th>Cost</th><th>Status</th><th>Submitted</th><th></th></tr>
        </thead>
        <tbody>
        <tr th:each="r : ${purchaseRequests}">
            <td th:text="${r.id}"></td>
            <td th:text="${r.itemName}"></td>
            <td th:text="${r.quantity}"></td>
            <td th:text="${r.estimatedCost}"></td>
            <td><span class="badge badge-status" th:classappend="'status-' + ${r.status}" th:text="${r.status}"></span></td>
            <td th:text="${#temporals.format(r.submittedAt, 'dd-MM-yyyy HH:mm')}"></td>
            <td><a th:href="@{'/employee/purchase/' + ${r.id}}" class="btn btn-sm btn-outline-secondary">View</a></td>
        </tr>
        <tr th:if="${#lists.isEmpty(purchaseRequests)}"><td colspan="7" class="text-center text-muted">No purchase requests yet</td></tr>
        </tbody>
    </table>
</div>
</body>
</html>
