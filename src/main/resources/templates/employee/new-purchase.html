<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>New Purchase Request - FlowForge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/header :: navbar('EMPLOYEE')}"></nav>
<div class="container">
    <div class="card shadow-sm" style="max-width: 600px; margin: auto;">
        <div class="card-body p-4">
            <h4 class="mb-4">Submit Purchase Request</h4>
            <form th:action="@{/employee/purchase/new}" method="post" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label">Item Name</label>
                    <input type="text" name="itemName" class="form-control" required>
                </div>
                <div class="row">
                    <div class="col mb-3">
                        <label class="form-label">Quantity</label>
                        <input type="number" name="quantity" class="form-control" min="1" required>
                    </div>
                    <div class="col mb-3">
                        <label class="form-label">Estimated Cost</label>
                        <input type="number" step="0.01" name="estimatedCost" class="form-control" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Business Justification</label>
                    <textarea name="justification" class="form-control" rows="3" required></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Quotation Attachment (optional)</label>
                    <input type="file" name="attachment" class="form-control">
                </div>
                <button type="submit" class="btn btn-primary w-100">Submit Request</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
