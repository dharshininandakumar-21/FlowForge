<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Manager Dashboard - FlowForge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/header :: navbar('MANAGER')}"></nav>
<div class="container">
    <h3 class="mb-4">Welcome, <span th:text="${user.name}"></span></h3>

    <h5>Leave Requests From My Team</h5>
    <table class="table table-bordered bg-white">
        <thead>
        <tr><th>ID</th><th>Employee</th><th>Type</th><th>Dates</th><th>Status</th><th></th></tr>
        </thead>
        <tbody>
        <tr th:each="r : ${leaveRequests}">
            <td th:text="${r.id}"></td>
            <td th:text="${r.employee.name}"></td>
            <td th:text="${r.leaveType}"></td>
            <td th:text="${r.startDate} + ' to ' + ${r.endDate}"></td>
            <td><span class="badge badge-status" th:classappend="'status-' + ${r.status}" th:text="${r.status}"></span></td>
            <td><a th:href="@{'/manager/leave/' + ${r.id}}" class="btn btn-sm btn-primary">Review</a></td>
        </tr>
        <tr th:if="${#lists.isEmpty(leaveRequests)}"><td colspan="6" class="text-center text-muted">No leave requests</td></tr>
        </tbody>
    </table>

    <h5 class="mt-4">Purchase Requests From My Team</h5>
    <table class="table table-bordered bg-white">
        <thead>
        <tr><th>ID</th><th>Employee</th><th>Item</th><th>Cost</th><th>Status</th><th></th></tr>
        </thead>
        <tbody>
        <tr th:each="r : ${purchaseRequests}">
            <td th:text="${r.id}"></td>
            <td th:text="${r.employee.name}"></td>
            <td th:text="${r.itemName}"></td>
            <td th:text="${r.estimatedCost}"></td>
            <td><span class="badge badge-status" th:classappend="'status-' + ${r.status}" th:text="${r.status}"></span></td>
            <td><a th:href="@{'/manager/purchase/' + ${r.id}}" class="btn btn-sm btn-primary">Review</a></td>
        </tr>
        <tr th:if="${#lists.isEmpty(purchaseRequests)}"><td colspan="6" class="text-center text-muted">No purchase requests</td></tr>
        </tbody>
    </table>
</div>
</body>
</html>
