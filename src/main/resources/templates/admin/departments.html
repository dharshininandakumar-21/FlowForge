<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Manage Departments - FlowForge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/header :: navbar('ADMIN')}"></nav>
<div class="container">
    <h3 class="mb-4">Manage Departments</h3>

    <div class="card card-stat p-3 mb-4" style="max-width: 600px;">
        <h5>Add New Department</h5>
        <form th:action="@{/admin/departments/new}" method="post" class="d-flex gap-2">
            <input type="text" name="name" class="form-control" placeholder="Department Name" required>
            <select name="managerId" class="form-select" style="max-width: 220px;">
                <option value="">No Manager Yet</option>
                <option th:each="m : ${managers}" th:value="${m.id}" th:text="${m.name}"></option>
            </select>
            <button class="btn btn-primary" type="submit">Add</button>
        </form>
    </div>

    <p class="text-muted" style="max-width: 700px;">
        Each department's assigned manager automatically receives every request submitted
        by employees in that department &mdash; no manual selection required
        (Department-Based Dynamic Routing).
    </p>

    <table class="table table-bordered bg-white" style="max-width: 700px;">
        <thead><tr><th>ID</th><th>Name</th><th>Assigned Manager</th><th></th></tr></thead>
        <tbody>
        <tr th:each="d : ${departments}">
            <td th:text="${d.id}"></td>
            <td th:text="${d.name}"></td>
            <td th:text="${d.manager != null ? d.manager.name : 'Not Assigned'}"></td>
            <td>
                <form th:action="@{'/admin/departments/' + ${d.id} + '/assign-manager'}" method="post" class="d-flex gap-2">
                    <select name="managerId" class="form-select form-select-sm">
                        <option value="">No Manager</option>
                        <option th:each="m : ${managers}" th:value="${m.id}" th:text="${m.name}"
                                th:selected="${d.manager != null and d.manager.id == m.id}"></option>
                    </select>
                    <button class="btn btn-sm btn-outline-primary" type="submit">Save</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
