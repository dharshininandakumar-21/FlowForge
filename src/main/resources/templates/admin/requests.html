<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>All Requests - FlowForge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/header :: navbar('ADMIN')}"></nav>
<div class="container">
    <h3 class="mb-4">All Requests</h3>

    <form th:action="@{/admin/requests}" method="get" class="row g-2 mb-4">
        <div class="col-auto">
            <select name="type" class="form-select">
                <option value="">All Types</option>
                <option value="LEAVE">Leave</option>
                <option value="PURCHASE">Purchase</option>
            </select>
        </div>
        <div class="col-auto">
            <select name="status" class="form-select">
                <option value="">All Statuses</option>
                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
            </select>
        </div>
        <div class="col-auto">
            <button class="btn btn-primary" type="submit">Filter</button>
        </div>
    </form>

    <h5>Leave Requests</h5>
    <table class="table table-bordered bg-white">
        <thead><tr><th>ID</th><th>Employee</th><th>Manager</th><th>Type</th><th>Status</th><th></th></tr></thead>
        <tbody>
        <tr th:each="r : ${leaveRequests}">
            <td th:text="${r.id}"></td>
            <td th:text="${r.employee.name}"></td>
            <td th:text="${r.manager != null ? r.manager.name : '-'}"></td>
            <td th:text="${r.leaveType}"></td>
            <td><span class="badge badge-status" th:classappend="'status-' + ${r.status}" th:text="${r.status}"></span></td>
            <td><a th:href="@{'/admin/leave/' + ${r.id}}" class="btn btn-sm btn-outline-secondary">View</a></td>
        </tr>
        <tr th:if="${#lists.isEmpty(leaveRequests)}"><td colspan="6" class="text-center text-muted">No records</td></tr>
        </tbody>
    </table>

    <h5 class="mt-4">Purchase Requests</h5>
    <table class="table table-bordered bg-white">
        <thead><tr><th>ID</th><th>Employee</th><th>Manager</th><th>Item</th><th>Status</th><th></th></tr></thead>
        <tbody>
        <tr th:each="r : ${purchaseRequests}">
            <td th:text="${r.id}"></td>
            <td th:text="${r.employee.name}"></td>
            <td th:text="${r.manager != null ? r.manager.name : '-'}"></td>
            <td th:text="${r.itemName}"></td>
            <td><span class="badge badge-status" th:classappend="'status-' + ${r.status}" th:text="${r.status}"></span></td>
            <td><a th:href="@{'/admin/purchase/' + ${r.id}}" class="btn btn-sm btn-outline-secondary">View</a></td>
        </tr>
        <tr th:if="${#lists.isEmpty(purchaseRequests)}"><td colspan="6" class="text-center text-muted">No records</td></tr>
        </tbody>
    </table>
</div>
</body>
</html>
