<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Manage Users - FlowForge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/header :: navbar('ADMIN')}"></nav>
<div class="container">
    <h3 class="mb-4">Manage Users</h3>

    <div class="card card-stat p-3 mb-4">
        <h5>Add New User</h5>
        <form th:action="@{/admin/users/new}" method="post" class="row g-2">
            <div class="col-md-3"><input type="text" name="name" class="form-control" placeholder="Full Name" required></div>
            <div class="col-md-3"><input type="email" name="email" class="form-control" placeholder="Email" required></div>
            <div class="col-md-2"><input type="password" name="password" class="form-control" placeholder="Password" required></div>
            <div class="col-md-2">
                <select name="role" class="form-select" required>
                    <option value="EMPLOYEE">Employee</option>
                    <option value="MANAGER">Manager</option>
                    <option value="ADMIN">Admin</option>
                </select>
            </div>
            <div class="col-md-2">
                <select name="departmentId" class="form-select">
                    <option value="">No Department</option>
                    <option th:each="d : ${departments}" th:value="${d.id}" th:text="${d.name}"></option>
                </select>
            </div>
            <div class="col-md-3 mt-2">
                <select name="managerId" class="form-select">
                    <option value="">No Manager</option>
                    <option th:each="m : ${managers}" th:value="${m.id}" th:text="${m.name}"></option>
                </select>
            </div>
            <div class="col-md-2 mt-2">
                <button class="btn btn-primary w-100" type="submit">Add User</button>
            </div>
        </form>
    </div>

    <table class="table table-bordered bg-white">
        <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Department</th><th>Manager</th><th>Status</th><th></th></tr></thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.name}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.role}"></td>
            <td th:text="${u.department != null ? u.department.name : '-'}"></td>
            <td th:text="${u.manager != null ? u.manager.name : '-'}"></td>
            <td th:text="${u.enabled ? 'Active' : 'Disabled'}"></td>
            <td>
                <form th:action="@{'/admin/users/' + ${u.id} + '/toggle'}" method="post" class="d-inline">
                    <button class="btn btn-sm btn-outline-secondary" type="submit" th:text="${u.enabled ? 'Disable' : 'Enable'}"></button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
